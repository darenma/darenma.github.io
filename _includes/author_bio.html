<!DOCTYPE html>
<hr>
<span>
   <div>
      # include author image if there is an author image
      {% if author.image %}
         <img src="{{author.image}}" class="author-img">
      {% endif %}
      <div>
         <h3> {{author.name}} &nbsp;
            # include link to author's twitter if they have provided a twitter account
           {% if author.linkedin %}
              <a href="{{author.linkedin}}" class="icon fa-linkedin"><span class="label">LinkedIn</span></a>
            {% endif %}
          </h3>
      </div>
   </div>
   {{ author.bio }}
</span>
<br>
